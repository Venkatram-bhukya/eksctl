apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

iam:
  withOIDC: true

managedNodeGroups:
- name: spot
  instanceTypes:
    - t3.medium
    - t3a.medium
    - m5.large
    - m5a.large
    - m5n.large
    - c5.large
  spot: true
  desiredCapacity: 2
  minSize: 1
  maxSize: 3